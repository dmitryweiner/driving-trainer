<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Тренажёр ПДД Израиля</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="hud-pill" id="stats" title="Успехи / неудачи / процент успешных">
        <span class="ok">✓ <span data-value="passed">0</span></span>
        <span class="bad">✗ <span data-value="failed">0</span></span>
        <span class="pct"><span data-value="percent">0</span>%</span>
      </div>
      <div class="hud-pill" id="time" title="Оставшееся время">⏱ <span data-value="time">60</span></div>
      <div class="hud-pill" id="speed" title="Скорость">🚗 <span data-value="speed">0</span> км/ч</div>
      <button class="hud-pill" id="btn-ticket" type="button" title="Показать билет (T)">🎫</button>
      <button class="hud-pill" id="btn-retry" type="button" title="Повторить задачу (R)">↻</button>
      <button class="hud-pill" id="btn-next" type="button" title="Следующая задача (N / Enter)">→</button>
    </div>
    <div id="ticket-overlay" hidden>
      <div class="card">
        <p class="question">
          <span data-value="question"></span>
          <button id="btn-hint" type="button" title="Показать подсказку (I)">i</button>
        </p>
        <p class="hint" data-value="instruction" hidden></p>
        <p class="meta"><small data-value="task-id"></small></p>
        <div class="actions">
          <button id="btn-ticket-go" type="button">Решать!</button>
        </div>
      </div>
    </div>
    <div id="result-overlay" hidden>
      <div class="card">
        <h2 data-value="result-title"></h2>
        <p class="reason" data-value="result-reason"></p>
        <p class="question"><small data-value="result-question"></small></p>
        <p class="explanation" data-value="result-explanation"></p>
        <div class="actions">
          <button id="btn-overlay-retry" type="button">↻ Повторить (R)</button>
          <button id="btn-overlay-next" type="button">→ Дальше (N)</button>
        </div>
      </div>
    </div>
    <div id="mobile-controls">
      <div id="ctl-left">
        <button id="btn-accel" aria-label="Газ">▲</button>
        <button id="btn-reverse" aria-label="Тормоз / задний ход">▼</button>
      </div>
      <div id="ctl-right">
        <button id="btn-steer-left" aria-label="Руль влево">◀</button>
        <button id="btn-steer-right" aria-label="Руль вправо">▶</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
